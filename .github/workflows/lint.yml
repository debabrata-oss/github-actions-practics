#what is the  goal of your  workflow
#Gola: whenever some one changes the python code,
# the linter will check if the syntax ,format, indentation (linting) is correct or not .
name: Auto Linter

on: 
  push:
     paths: "*.py"


jobs:
  code-linter: 
    runs-on: ubuntu-latest
    # this step automatilly clone the code of the current branch into the runner
    steps: 
      - name: Chekcout/code the clone
        uses: actions/checkout@v7
  # this step install python install 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
# this step will install linting tool
      - name: install linter
        run: pip install ruff
# this step will run linter 
      - name: check the file for linting
        run: ruff check   . 
        
        
